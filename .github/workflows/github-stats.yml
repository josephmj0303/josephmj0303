name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate GitHub Stats
        run: |
          mkdir -p assets
          curl -L -o assets/github-stats.svg "https://github-readme-stats.vercel.app/api?username=josephmj0303&show_icons=true&theme=radical&count_private=true"
          curl -L -o assets/top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs?username=josephmj0303&layout=compact&theme=radical"

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add assets/*.svg
          git commit -m "update stats" || echo "No changes"
          git push
